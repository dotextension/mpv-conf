profile=high-quality

### General
osc=no
osd-bar=no
title-bar=no
keep-open=yes
input-default-bindings=no
title=${?filename:${!playlist-count==1:[${playlist-pos-1}/${playlist-count}] }${filename/no-ext}}${!filename:No file - mpv}

keepaspect-window=no
cursor-autohide=1000

# Playlist and Behavior
ordered-chapters=no
save-position-on-quit=yes
reset-on-next-file=video-zoom,panscan,video-unscaled,video-align-x,video-align-y,video-rotate

# Watch Later Settings
watch-later-dir="~~/cache/watch_later"
write-filename-in-watch-later-config=yes
watch-later-options-remove=sub-pos,osd-margin-y

### OSD
osd-level=1
osd-font='Montserrat'
osd-font-size=25
osd-outline-size=0
osd-shadow-offset=4

# Style the OSD background box cleanly
osd-border-style=background-box
osd-back-color="#80000000"  # 50% transparent black box

# Optional: Set a brief overlay message on start (or leave blank if handled by your window title)
osd-playing-msg="${filename/no-ext} [${playlist-pos-1}/${playlist-count}]"

### Terminal
msg-color=yes
msg-module=yes
term-status-msg="Playback: ${time-pos} / ${duration} (${percent-pos}%)"

### Playlist
directory-mode=ignore
prefetch-playlist=yes
autocreate-playlist=filter
directory-filter-types=video
osd-playlist-entry=filename

# Safely append custom extensions if you want strict local directory filtering
video-exts+=3g2,3gp,asf,avi,f4v,flv,gif,h264,h265,ivf,m2ts,m4v,mj2,mkv,mov,mp4,mp4v,mpeg,mpg,mxf,ogv,rmvb,ts,webm,wmv,y4m
audio-exts+=aac,ac3,aiff,ape,au,dsf,dts,flac,m4a,mid,midi,mka,mp1,mp2,mp3,mpc,oga,ogg,ogm,opus,tak,thd,tta,wav,wma,wv
image-exts+=apng,avif,bmp,heic,heif,j2k,jp2,jpeg,jpg,jxl,png,qoi,svg,tga,tif,tiff,webp

### Screenshots
screenshot-directory="~/Pictures/ss"
screenshot-format=png
screenshot-template="mpv-ss-%F-(%P)-%n"

### Cache
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=200MiB

### Video
vo=gpu-next
gpu-api=vulkan
hwdec=auto-safe
video-sync=display-resample
interpolation=yes
tscale=oversample

# Artifact Removal & Precision Gradients
deband=yes
temporal-dither=yes

# Advanced Image Rescaling
sigmoid-upscaling=yes
correct-downscaling=yes

### Audio
volume=100
volume-max=150
audio-pitch-correction=yes
audio-file-auto=fuzzy
audio-client-name=mpv

### Subtitles
# Automatic discovery and path hunting
sub-auto=all
sub-file-paths=sub;subs;subtitles;srt;ass
embeddedfonts=yes

# Smooth rendering and frame alignment
blend-subtitles=yes
sub-vsfilter-bidi-compat=yes

# Fix missing text bugs when scrubbing/seeking
demuxer-mkv-subtitle-preroll=yes
demuxer-mkv-subtitle-preroll-secs=2

# Fine-tuning text layout styles
sub-fix-timing=no
sub-use-margins=yes
sub-ass-force-margins=no       # Set to 'no' to keep anime typesetting from breaking
sub-ass-style-overrides=Kerning=yes
sub-ass-override=scale         # Allows custom fonts to load natively without being overwritten

# Default styling parameters for simple text (SRT)
sub-font='Verdana'
sub-font-size=30
sub-outline-size=1
sub-shadow-offset=1
# sub-border-style=background-box
# sub-back-color="#99000000"     # 60% transparent black box backdrop

### Languages
# Prioritize English subtitles, fall back to Arabic
slang=en,enm

# Prioritize Japanese audio, fall back to English
alang=ja,jp,en

### yt-dlp / Streaming
ytdl=yes
script-opts-append=ytdl_hook-all_formats=yes



script-opts-append=console-font_size=25
